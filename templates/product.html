{% extends 'base.html' %}
{% block content %}
<div class="row">
    <div class="col-md-6">
        <div style="background:#0a0f24; border-radius:14px; padding:20px; display:flex; align-items:center; justify-content:center;">
            <img src="{{ product.image_url }}" class="img-fluid rounded" alt="{{ product.name }}" style="max-height:400px; object-fit:contain;">
        </div>
    </div>
    <div class="col-md-6">
        <h2 style="color:#f0f4ff;">{{ product.name }}</h2>
        <p class="fs-4 fw-bold" style="color:#8bb5ff;">{{ "%.2f"|format(product.price) }} ₽</p>
        <p style="color:#b9c2e5;">{{ product.description }}</p>
        <p style="color:#8895c9;">Категория: {{ product.category }}</p>
        <div class="d-flex gap-2 mt-3">
            <a href="{{ url_for('add_to_cart', product_id=product.id) }}" class="btn btn-primary" style="background:var(--accent); border:none; padding:10px 24px;">🛒 Добавить в корзину</a>
            <a href="{{ url_for('add_to_favorites', product_id=product.id) }}" class="btn btn-outline-danger">❤️ В избранное</a>
        </div>
    </div>
</div>
{% endblock %}
